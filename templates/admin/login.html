{% extends 'base.html' %}
{% block title %}Admin Login — RMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
          <h3 class="mt-2 fw-bold">Admin Login</h3>
          <p class="text-muted small">Access the Result Management System admin panel</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Enter admin username"
                required
                autocomplete="username"
              />
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter password"
                required
                autocomplete="current-password"
              />
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('student.home') }}" class="text-decoration-none text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
